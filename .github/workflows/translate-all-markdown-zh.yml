name: Translate all English Markdown to Chinese

on:
  push:
    paths:
      - '.github/workflows/translate-all-markdown-zh.yml'
      - '.github/scripts/translate_all_markdown.py'
      - '.github/scripts/translate_all_markdown_fast.py'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: translate-all-markdown-zh
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MAX_FILES_PER_RUN: '1'
      TRANSLATE_WORKERS: '10'
      MAX_FILE_ATTEMPTS: '5'
      REQUEST_INTERVAL: '0.05'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Translate one remaining document with fast profile
        run: python .github/scripts/translate_all_markdown_fast.py

      - name: Count remaining files
        id: remaining
        shell: bash
        run: |
          count=$(python .github/scripts/translate_all_markdown.py --pending-count)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Remaining eligible files: $count"

      - name: Dispatch continuation run
        if: steps.remaining.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail -sS -L \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/translate-all-markdown-zh.yml/dispatches" \
            -d '{"ref":"main"}'
          echo 'Continuation run dispatched.'
