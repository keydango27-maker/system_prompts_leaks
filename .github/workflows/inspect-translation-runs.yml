name: Inspect translation runs

on:
  push:
    paths:
      - '.github/workflows/inspect-translation-runs.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build pending-file report
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > .translation-pending.txt
          import importlib.util
          spec = importlib.util.spec_from_file_location('translator', '.github/scripts/translate_all_markdown.py')
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          state = module.load_state()
          pending, blocked = module.pending_sources(state)
          print(f'pending={len(pending)} blocked={len(blocked)}')
          for path in pending:
              attempts = state.get('attempts', {}).get(path.as_posix(), 0)
              print(f'{path.stat().st_size}\t{attempts}\t{path.as_posix()}')
          if blocked:
              print('\nBLOCKED')
              for path in blocked:
                  print(path.as_posix())
          PY
      - name: Fetch latest translation run and job log tail
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H 'Accept: application/vnd.github+json'
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H 'X-GitHub-Api-Version: 2022-11-28'
          )
          curl --fail -sS -L "${headers[@]}" \
            "$api/actions/workflows/translate-all-markdown-zh.yml/runs?per_page=20" \
            > .translation-runs.json
          run_id=$(jq -r '.workflow_runs[0].id // empty' .translation-runs.json)
          if [ -z "$run_id" ]; then
            echo 'No translation run found.' > .translation-last-job-tail.txt
            exit 0
          fi
          curl --fail -sS -L "${headers[@]}" \
            "$api/actions/runs/$run_id/jobs?per_page=20" > /tmp/jobs.json
          job_id=$(jq -r '.jobs[0].id // empty' /tmp/jobs.json)
          if [ -z "$job_id" ]; then
            echo "Run $run_id has no job." > .translation-last-job-tail.txt
            exit 0
          fi
          curl --fail -sS -L "${headers[@]}" \
            "$api/actions/jobs/$job_id/logs" | tail -n 250 > .translation-last-job-tail.txt
      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .translation-runs.json .translation-pending.txt .translation-last-job-tail.txt
          git commit -m 'Record translation workflow status' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

# Diagnostic refresh: pending list and latest job tail.
